version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DB_USER: admin
      DB_PASSWORD: admin
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: postgres
      APP_DB_NAME: pimpmyfridge_db
      REDIS_URL: redis://redis:6379
      BACKEND_BASE_URL: http://backend:5001
      OLLAMA_BASE_URL: http://ollama-ai:11434
      JWT_SECRET: change-me-for-local-development
    depends_on:
      - redis
      - ai

  frontend:
    build:
      context: ./frontend/pimp-my-fridge
      dockerfile: Dockerfile
    ports:
      - "3000:3000" 
    environment:
      REACT_APP_API_URL: http://localhost/api 
    volumes:
      - ./frontend/pimp-my-fridge:/app 
      - /app/node_modules
    stdin_open: true
    tty: true

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "80:80" 
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  ai:
    image: ollama/ollama
    container_name: ollama-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    command: []
volumes:
  ollama:
