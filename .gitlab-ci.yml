stages:
  - install
  - test
  - build
  - deploy

# Étape 1 : Installer les dépendances
install_dependencies:
  stage: install
  image: node:20
  script:
    - cd frontend/pimp-my-fridge
    - npm install
    - cd ../../backend
    - npm install
    - cd  ..
  artifacts:
    paths:
      - frontend/pimp-my-fridge/node_modules/
      - backend/node_modules/
  only: 
    - dev 
    - main

# Étape 2 : Tester le frontend
test_frontend:
  stage: test
  image: node:20
  script:
    - cd frontend/pimp-my-fridge
    - npm test -- --watchAll=false
    - cd ../..
  only: 
    - dev 
    - main

