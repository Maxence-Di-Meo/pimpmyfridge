# Étape 4 : Build du frontend
build_frontend:
  stage: build
  image: node:20
  script:
    - cd frontend/pimp-my-fridge
    - npm run build
  artifacts:
    paths:
      - frontend/build/
  only: 
    - dev 
    - main

